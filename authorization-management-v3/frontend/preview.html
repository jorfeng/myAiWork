<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权书列表页 - 预览</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Element Plus -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
        }
        .auth-letter-list-page {
            padding: 20px;
            background-color: #f5f7fa;
            min-height: 100vh;
        }
        .query-card {
            background: #fff;
            border-radius: 4px;
            margin-bottom: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .query-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .form-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .form-item .label {
            width: 100px;
            text-align: right;
            margin-right: 10px;
            color: #606266;
            font-size: 14px;
        }
        .query-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #ebeef5;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .table-card {
            background: #fff;
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .pagination-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 16px;
            padding-top: 16px;
        }
        .el-table {
            font-size: 14px;
        }
        .el-tag {
            min-width: 60px;
            text-align: center;
        }
        .link-cell {
            color: #409eff;
            cursor: pointer;
            text-decoration: none;
        }
        .link-cell:hover {
            text-decoration: underline;
        }
        .edit-icon {
            color: #409eff;
            cursor: pointer;
            font-size: 16px;
        }
        .edit-icon:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="auth-letter-list-page">
            <!-- 查询条件区 -->
            <div class="query-card">
                <div class="query-form">
                    <div class="form-item">
                        <span class="label">授权书名称</span>
                        <el-input v-model="queryParams.name" placeholder="请输入授权书名称" clearable style="width: 180px"></el-input>
                    </div>
                    <div class="form-item">
                        <span class="label">授权对象层级</span>
                        <el-select v-model="queryParams.authTargetLevel" multiple collapse-tags collapse-tags-tooltip placeholder="请选择" clearable style="width: 180px">
                            <el-option v-for="item in authTargetLevelOptions" :key="item.code" :label="item.name" :value="item.code"></el-option>
                        </el-select>
                    </div>
                    <div class="form-item">
                        <span class="label">适用区域</span>
                        <el-select v-model="queryParams.applicableRegion" multiple collapse-tags collapse-tags-tooltip placeholder="请选择" clearable style="width: 180px">
                            <el-option v-for="item in applicableRegionOptions" :key="item.code" :label="item.name" :value="item.code"></el-option>
                        </el-select>
                    </div>
                    <div class="form-item">
                        <span class="label">授权发布层级</span>
                        <el-select v-model="queryParams.authPublishLevel" multiple collapse-tags collapse-tags-tooltip placeholder="请选择" clearable style="width: 180px">
                            <el-option v-for="item in authPublishLevelOptions" :key="item.code" :label="item.name" :value="item.code"></el-option>
                        </el-select>
                    </div>
                    <div class="form-item">
                        <span class="label">授权发布组织</span>
                        <el-tree-select
                            v-model="queryParams.authPublishOrg"
                            multiple
                            collapse-tags
                            collapse-tags-tooltip
                            placeholder="请选择"
                            clearable
                            check-strictly
                            :data="orgTreeData"
                            :props="{ label: 'name', value: 'code', children: 'children' }"
                            style="width: 200px"
                        ></el-tree-select>
                    </div>
                    <div class="form-item">
                        <span class="label">授权书发布年份</span>
                        <el-date-picker v-model="queryParams.publishYear" type="year" placeholder="请选择年份" value-format="YYYY" style="width: 150px"></el-date-picker>
                    </div>
                    <div class="form-item">
                        <span class="label">状态</span>
                        <el-select v-model="queryParams.status" placeholder="请选择" clearable style="width: 120px">
                            <el-option label="草稿" value="DRAFT"></el-option>
                            <el-option label="已发布" value="PUBLISHED"></el-option>
                            <el-option label="已失效" value="EXPIRED"></el-option>
                        </el-select>
                    </div>
                </div>
                <div class="query-buttons">
                    <el-button type="primary" @click="handleQuery">
                        <el-icon><search /></el-icon>
                        查询
                    </el-button>
                    <el-button @click="handleReset">
                        <el-icon><refresh /></el-icon>
                        重置
                    </el-button>
                </div>
            </div>

            <!-- 功能按钮区 -->
            <div class="action-buttons">
                <el-button type="primary" @click="handleCreate">
                    <el-icon><plus /></el-icon>
                    新建授权书
                </el-button>
                <el-button @click="handleUpdate">
                    <el-icon><edit /></el-icon>
                    更新
                </el-button>
                <el-button type="success" @click="handleActivate">
                    <el-icon><check /></el-icon>
                    生效
                </el-button>
                <el-button type="warning" @click="handleDeactivate">
                    <el-icon><close /></el-icon>
                    失效
                </el-button>
                <el-button type="danger" @click="handleDelete">
                    <el-icon><delete /></el-icon>
                    删除
                </el-button>
            </div>

            <!-- 数据表格区 -->
            <div class="table-card">
                <el-table
                    ref="tableRef"
                    :data="tableData"
                    v-loading="loading"
                    @selection-change="handleSelectionChange"
                    stripe
                    border
                    style="width: 100%"
                >
                    <el-table-column type="selection" width="50" align="center"></el-table-column>
                    <el-table-column type="index" label="序号" width="60" align="center">
                        <template #default="scope">
                            {{ (pagination.pageNum - 1) * pagination.pageSize + scope.$index + 1 }}
                        </template>
                    </el-table-column>
                    <el-table-column label="操作" width="60" align="center">
                        <template #default="scope">
                            <el-icon v-if="scope.row.status === 'DRAFT'" class="edit-icon" @click="goToDetail(scope.row.id)">
                                <edit />
                            </el-icon>
                        </template>
                    </el-table-column>
                    <el-table-column prop="name" label="授权书名称" min-width="150">
                        <template #default="scope">
                            <span class="link-cell" @click="goToDetail(scope.row.id)">{{ scope.row.name }}</span>
                        </template>
                    </el-table-column>
                    <el-table-column prop="status" label="状态" width="80" align="center">
                        <template #default="scope">
                            <el-tag :type="getStatusTagType(scope.row.status)">
                                {{ scope.row.statusText }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="授权对象层级" width="120">
                        <template #default="scope">
                            {{ formatArrayText(scope.row.authTargetLevelText) }}
                        </template>
                    </el-table-column>
                    <el-table-column label="适用区域" width="100">
                        <template #default="scope">
                            {{ formatArrayText(scope.row.applicableRegionText) }}
                        </template>
                    </el-table-column>
                    <el-table-column label="授权发布层级" width="120">
                        <template #default="scope">
                            {{ formatArrayText(scope.row.authPublishLevelText) }}
                        </template>
                    </el-table-column>
                    <el-table-column label="授权发布组织" width="150">
                        <template #default="scope">
                            {{ formatArrayText(scope.row.authPublishOrgText) }}
                        </template>
                    </el-table-column>
                    <el-table-column prop="publishYear" label="授权书发布年份" width="120" align="center"></el-table-column>
                    <el-table-column prop="createdBy" label="创建人" width="100" align="center"></el-table-column>
                    <el-table-column prop="createdAt" label="创建时间" width="160" align="center">
                        <template #default="scope">
                            {{ formatDateTime(scope.row.createdAt) }}
                        </template>
                    </el-table-column>
                </el-table>

                <!-- 分页组件 -->
                <div class="pagination-container">
                    <el-pagination
                        v-model:current-page="pagination.pageNum"
                        v-model:page-size="pagination.pageSize"
                        :page-sizes="[10, 20, 50, 100]"
                        :total="pagination.total"
                        layout="total, sizes, prev, pager, next, jumper"
                        @size-change="handleSizeChange"
                        @current-change="handleCurrentChange"
                    />
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted } = Vue

        const app = createApp({
            setup() {
                // 表格引用
                const tableRef = ref(null)

                // 加载状态
                const loading = ref(false)

                // 选中的行
                const selectedRows = ref([])

                // 查询参数
                const queryParams = reactive({
                    name: '',
                    authTargetLevel: [],
                    applicableRegion: [],
                    authPublishLevel: [],
                    authPublishOrg: [],
                    publishYear: null,
                    status: ''
                })

                // 分页参数
                const pagination = reactive({
                    pageNum: 1,
                    pageSize: 10,
                    total: 30
                })

                // 模拟表格数据
                const tableData = ref([
                    {
                        id: 1,
                        name: '2024年度销售授权书',
                        status: 'DRAFT',
                        statusText: '草稿',
                        authTargetLevelText: ['机关', '地区部'],
                        applicableRegionText: ['华东', '华北'],
                        authPublishLevelText: ['机关'],
                        authPublishOrgText: ['总部'],
                        publishYear: 2024,
                        createdBy: 'admin',
                        createdAt: '2024-03-10 10:30:00'
                    },
                    {
                        id: 2,
                        name: '2023年度采购授权书',
                        status: 'PUBLISHED',
                        statusText: '已发布',
                        authTargetLevelText: ['代表处'],
                        applicableRegionText: ['华南'],
                        authPublishLevelText: ['地区部'],
                        authPublishOrgText: ['华南区'],
                        publishYear: 2023,
                        createdBy: 'admin',
                        createdAt: '2023-12-15 14:20:00'
                    },
                    {
                        id: 3,
                        name: '2022年度财务授权书',
                        status: 'EXPIRED',
                        statusText: '已失效',
                        authTargetLevelText: ['办事处'],
                        applicableRegionText: ['西部'],
                        authPublishLevelText: ['代表处'],
                        authPublishOrgText: ['西部区'],
                        publishYear: 2022,
                        createdBy: 'admin',
                        createdAt: '2022-06-20 09:15:00'
                    },
                    {
                        id: 4,
                        name: '2024年度人事授权书',
                        status: 'DRAFT',
                        statusText: '草稿',
                        authTargetLevelText: ['机关'],
                        applicableRegionText: ['华东', '华南', '华北'],
                        authPublishLevelText: ['机关'],
                        authPublishOrgText: ['总部'],
                        publishYear: 2024,
                        createdBy: 'user1',
                        createdAt: '2024-03-08 16:45:00'
                    },
                    {
                        id: 5,
                        name: '2024年度技术授权书',
                        status: 'PUBLISHED',
                        statusText: '已发布',
                        authTargetLevelText: ['地区部', '代表处'],
                        applicableRegionText: ['华中'],
                        authPublishLevelText: ['地区部'],
                        authPublishOrgText: ['华中区'],
                        publishYear: 2024,
                        createdBy: 'admin',
                        createdAt: '2024-02-28 11:00:00'
                    }
                ])

                // 下拉选项数据
                const authTargetLevelOptions = ref([
                    { code: 'ORGANIZATION', name: '机关' },
                    { code: 'REGIONAL_DEPT', name: '地区部' },
                    { code: 'REPRESENTATIVE_OFFICE', name: '代表处' },
                    { code: 'OFFICE', name: '办事处' }
                ])

                const applicableRegionOptions = ref([
                    { code: 'EAST', name: '华东' },
                    { code: 'NORTH', name: '华北' },
                    { code: 'SOUTH', name: '华南' },
                    { code: 'WEST', name: '西部' },
                    { code: 'CENTRAL', name: '华中' }
                ])

                const authPublishLevelOptions = ref([
                    { code: 'ORGANIZATION', name: '机关' },
                    { code: 'REGIONAL_DEPT', name: '地区部' },
                    { code: 'REPRESENTATIVE_OFFICE', name: '代表处' },
                    { code: 'OFFICE', name: '办事处' }
                ])

                const orgTreeData = ref([
                    {
                        code: 'ORG001',
                        name: '总部',
                        children: [
                            {
                                code: 'ORG002',
                                name: '华东区',
                                children: [
                                    { code: 'ORG003', name: '上海办事处' },
                                    { code: 'ORG004', name: '杭州办事处' }
                                ]
                            },
                            {
                                code: 'ORG005',
                                name: '华北区',
                                children: [
                                    { code: 'ORG006', name: '北京办事处' },
                                    { code: 'ORG007', name: '天津办事处' }
                                ]
                            }
                        ]
                    }
                ])

                // 查询
                function handleQuery() {
                    pagination.pageNum = 1
                    ElementPlus.ElMessage.success('查询成功')
                }

                // 重置
                function handleReset() {
                    queryParams.name = ''
                    queryParams.authTargetLevel = []
                    queryParams.applicableRegion = []
                    queryParams.authPublishLevel = []
                    queryParams.authPublishOrg = []
                    queryParams.publishYear = null
                    queryParams.status = ''
                    pagination.pageNum = 1
                    ElementPlus.ElMessage.info('已重置查询条件')
                }

                // 表格选择变化
                function handleSelectionChange(selection) {
                    selectedRows.value = selection
                }

                // 分页大小变化
                function handleSizeChange(size) {
                    pagination.pageSize = size
                }

                // 页码变化
                function handleCurrentChange(page) {
                    pagination.pageNum = page
                }

                // 检查是否选中数据
                function checkSelection() {
                    if (selectedRows.value.length === 0) {
                        ElementPlus.ElMessage.warning('请先选择数据')
                        return false
                    }
                    return true
                }

                // 新建授权书
                function handleCreate() {
                    ElementPlus.ElMessage.info('新建授权书功能待实现')
                }

                // 更新
                function handleUpdate() {
                    if (!checkSelection()) return
                    ElementPlus.ElMessage.info('更新功能待实现')
                }

                // 生效
                function handleActivate() {
                    if (!checkSelection()) return
                    ElementPlus.ElMessageBox.confirm(
                        `确定要将选中的 ${selectedRows.value.length} 条数据发布生效吗？`,
                        '提示',
                        { type: 'warning' }
                    ).then(() => {
                        ElementPlus.ElMessage.success('操作成功')
                    }).catch(() => {})
                }

                // 失效
                function handleDeactivate() {
                    if (!checkSelection()) return
                    ElementPlus.ElMessageBox.confirm(
                        `确定要将选中的 ${selectedRows.value.length} 条数据设为失效吗？`,
                        '提示',
                        { type: 'warning' }
                    ).then(() => {
                        ElementPlus.ElMessage.success('操作成功')
                    }).catch(() => {})
                }

                // 删除
                function handleDelete() {
                    if (!checkSelection()) return
                    ElementPlus.ElMessageBox.confirm(
                        `确定要删除选中的 ${selectedRows.value.length} 条数据吗？`,
                        '提示',
                        { type: 'warning' }
                    ).then(() => {
                        ElementPlus.ElMessage.success('删除成功')
                    }).catch(() => {})
                }

                // 跳转到详情页
                function goToDetail(id) {
                    ElementPlus.ElMessage.info(`跳转到详情页: ID=${id}`)
                }

                // 获取状态标签类型
                function getStatusTagType(status) {
                    const types = {
                        DRAFT: 'info',
                        PUBLISHED: 'success',
                        EXPIRED: 'danger'
                    }
                    return types[status] || 'info'
                }

                // 格式化数组文本
                function formatArrayText(arr) {
                    if (!arr || arr.length === 0) return '-'
                    return arr.join('、')
                }

                // 格式化日期时间
                function formatDateTime(dateTime) {
                    if (!dateTime) return '-'
                    return dateTime
                }

                return {
                    tableRef,
                    loading,
                    selectedRows,
                    queryParams,
                    pagination,
                    tableData,
                    authTargetLevelOptions,
                    applicableRegionOptions,
                    authPublishLevelOptions,
                    orgTreeData,
                    handleQuery,
                    handleReset,
                    handleSelectionChange,
                    handleSizeChange,
                    handleCurrentChange,
                    handleCreate,
                    handleUpdate,
                    handleActivate,
                    handleDeactivate,
                    handleDelete,
                    goToDetail,
                    getStatusTagType,
                    formatArrayText,
                    formatDateTime
                }
            }
        })

        // 注册所有图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component)
        }

        app.use(ElementPlus)
        app.mount('#app')
    </script>
</body>
</html>
