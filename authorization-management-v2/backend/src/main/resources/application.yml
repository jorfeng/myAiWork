spring:
  application:
    name: authorization-management-v2

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_letter_v2
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.auth.letter: DEBUG
    org.hibernate.SQL: DEBUG